<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sith Clash</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: #121212;
            padding: 20px;
            border: 2px solid #ec4d58;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #ec4d58;
        }
        p {
            color: #fafafa;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 20px;
            background-color: #ec4d58;
            color: #fafafa;
            text-decoration: none;
            border-radius: 5px;
        }
        .button:hover {
            background-color: #ec4d58;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>The Sith Clash</h1>
        <p>Welcome to The Sith Clash, a crypto game designed to improve your financial skills. Join the Crypto Force, an Educational Academy, and master the art of cryptocurrency trading. <br>Currently, we are still in development, please be patient.</p>
        <a href="#" class="button">Start Game</a>
    </div>
</body>
</html>
