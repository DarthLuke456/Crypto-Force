<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro e Inicio de Sesión</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&display=swap');
        body {
            font-family: 'Exo 2', sans-serif;
            background: url('hero-image.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fafafa;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding-right: 50px;
            position: relative;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }
        .container {
            background-color: rgba(30, 30, 30, 0.8); /* Fondo ligeramente transparente */
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            width: 260px; /* Ancho reducido del contenedor */
            text-align: center;
            transition: all 0.3s ease;
            z-index: 2;
            position: relative;
        }
        h2 {
            text-align: center;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #ec4d58;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin: 10px 0; /* Margen ajustado para coincidir con los campos de entrada */
        }
        button:hover {
            background-color: #bf3b45;
        }
        .link {
            text-align: center;
            margin-top: 10px;
        }
        .link a {
            color: #ec4d58;
            text-decoration: none;
        }
        .link a:hover {
            color: #bf3b45;
        }
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #4285F4;
            color: #fff;
            margin: 10px 0; /* Margen ajustado para coincidir con los campos de entrada */
        }
        .google-btn img {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <h2>Registro</h2>
        <form id="registerForm">
            <input type="email" id="registerEmail" placeholder="Correo electrónico" required>
            <input type="password" id="registerPassword" placeholder="Contraseña" required>
            <button type="submit">Registrarse</button>
        </form>
        <button class="google-btn" id="googleRegister">
            <img src="https://img.icons8.com/color/16/000000/google-logo.png" alt="Google Logo">
            Registrarse con Google
        </button>
        <div class="link">
            <a href="#" onclick="toggleForms()">¿Ya tienes una cuenta? Inicia sesión</a>
        </div>
    </div>

    <div class="container" style="display: none;">
        <h2>Inicio de Sesión</h2>
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Correo electrónico" required>
            <input type="password" id="loginPassword" placeholder="Contraseña" required>
            <button type="submit">Iniciar Sesión</button>
        </form>
        <button class="google-btn" id="googleLogin">
            <img src="https://img.icons8.com/color/16/000000/google-logo.png" alt="Google Logo">
            Iniciar Sesión con Google
        </button>
        <div class="link">
            <a href="#" onclick="toggleForms()">¿No tienes una cuenta? Regístrate</a>
        </div>
    </div>

    <script>
        function toggleForms() {
            const containers = document.querySelectorAll('.container');
            containers.forEach(container => {
                container.style.display = container.style.display === 'none' ? 'block' : 'none';
            });
        }

        document.getElementById('registerForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    Swal.fire('Registro exitoso', '', 'success');
                })
                .catch((error) => {
                    Swal.fire('Error en el registro', error.message, 'error');
                });
        });

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    Swal.fire('Inicio de sesión exitoso', '', 'success');
                })
                .catch((error) => {
                    Swal.fire('Error en el inicio de sesión', error.message, 'error');
                });
        });

        document.getElementById('googleRegister').addEventListener('click', function() {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider)
                .then((result) => {
                    Swal.fire('Registro con Google exitoso', '', 'success');
                })
                .catch((error) => {
                    Swal.fire('Error en el registro con Google', error.message, 'error');
                });
        });

        document.getElementById('googleLogin').addEventListener('click', function() {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider)
                .then((result) => {
                    Swal.fire('Inicio de sesión con Google exitoso', '', 'success');
                })
                .catch((error) => {
                    Swal.fire('Error en el inicio de sesión con Google', error.message, 'error');
                });
        });
        // Import SweetAlert2 for better alert messages
        import Swal from 'https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js';
    </script>

    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-analytics.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBm9LKrV2iQhewuSFfw3E9Il79Lva2IwW8",
            authDomain: "crypto-force-456.firebaseapp.com",
            projectId: "crypto-force-456",
            storageBucket: "crypto-force-456.firebasestorage.app",
            messagingSenderId: "909754364846",
            appId: "1:909754364846:web:ea53e8eb6c471e29728e3f",
            measurementId: "G-6LVWZQ6EB5"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
    </script>
</body>
</html>
