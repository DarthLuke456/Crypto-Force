<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro e Inicio de Sesión</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&display=swap');
        body {
            font-family: 'Exo 2', sans-serif;
            background: url('hero-image.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fafafa;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding-right: 50px; /* Adjust this value to move the container more to the right */
            position: relative;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* Adjust the opacity to darken the background */
            z-index: 1;
        }
        .container {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5); /* Added shadow to the container */
            width: 280px; /* Reduced the width of the container */
            text-align: center;
            transition: all 0.3s ease;
            z-index: 2;
            position: relative;
        }
        h2 {
            text-align: center;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #ec4d58;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 20px; /* Added margin-top to buttons */
        }
        button:hover {
            background-color: #bf3b45;
        }
        .link {
            text-align: center;
            margin-top: 10px;
        }
        .link a {
            color: #ec4d58;
            text-decoration: none;
        }
        .link a:hover {
            color: #bf3b45;
        }
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #4285F4;
            color: #fff;
            margin-top: 10px;
        }
        .google-btn img {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <h2>Registro</h2>
        <form id="registerForm">
            <input type="email" id="registerEmail" placeholder="Correo electrónico" required>
            <input type="password" id="registerPassword" placeholder="Contraseña" required>
            <button type="submit">Registrarse</button>
        </form>
        <button class="google-btn" id="googleRegister">
            <img src="https://img.icons8.com/color/16/000000/google-logo.png" alt="Google Logo">
            Registrarse con Google
        </button>
        <div class="link">
            <a href="#" onclick="toggleForms()">¿Ya tienes una cuenta? Inicia sesión</a>
        </div>
    </div>

    <div class="container" style="display: none;">
        <h2>Inicio de Sesión</h2>
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Correo electrónico" required>
            <input type="password" id="loginPassword" placeholder="Contraseña" required>
            <button type="submit">Iniciar Sesión</button>
        </form>
        <button class="google-btn" id="googleLogin">
            <img src="https://img.icons8.com/color/16/000000/google-logo.png" alt="Google Logo">
            Iniciar Sesión con Google
        </button>
        <div class="link">
            <a href="#" onclick="toggleForms()">¿No tienes una cuenta? Regístrate</a>
        </div>
    </div>

    <script>
        function toggleForms() {
            const containers = document.querySelectorAll('.container');
            containers.forEach(container => {
                container.style.display = container.style.display === 'none' ? 'block' : 'none';
            });
        }

        document.getElementById('registerForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert('Registro exitoso');
                })
                .catch((error) => {
                    alert('Error en el registro: ' + error.message);
                });
        });

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert('Inicio de sesión exitoso');
                })
                .catch((error) => {
                    alert('Error en el inicio de sesión: ' + error.message);
                });
        });

        document.getElementById('googleRegister').addEventListener('click', function() {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider)
                .then((result) => {
                    alert('Registro con Google exitoso');
                })
                .catch((error) => {
                    alert('Error en el registro con Google: ' + error.message);
                });
        });

        document.getElementById('googleLogin').addEventListener('click', function() {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider)
                .then((result) => {
                    alert('Inicio de sesión con Google exitoso');
                })
                .catch((error) => {
                    alert('Error en el inicio de sesión con Google: ' + error.message);
                });
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkgRLbKmQOnyxKgnxDaUzGJ-RMcU8yQ6o",
            authDomain: "crypto-force-17d09.firebaseapp.com",
            projectId: "crypto-force-17d09",
            storageBucket: "crypto-force-17d09.firebasestorage.app",
            messagingSenderId: "430713846577",
            appId: "1:430713846577:web:7abdb201e92e713c990e10",
            measurementId: "G-5L0E72S039"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
    </script>
</body>
</html>
